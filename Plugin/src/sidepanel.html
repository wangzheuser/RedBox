<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beav</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <img src="icons/icon48.png" alt="Beav" class="brand-icon">
        <div>
          <h1>Beav</h1>
          <div id="workspace-name" class="workspace-name">当前空间：读取中</div>
          <div id="server-status" class="status">正在检测桌面端...</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="open-settings" class="icon-btn" title="打开设置页" aria-label="设置">⚙</button>
        <button id="refresh" class="icon-btn" title="刷新当前页面状态" aria-label="刷新">↻</button>
      </div>
    </header>

    <section id="account-binding-notice" class="section account-binding-notice hidden" aria-live="polite">
      <div>
        <div id="account-binding-title" class="notice-title">当前空间未绑定账号</div>
        <div id="account-binding-copy" class="notice-copy">打开账号主页后，可以绑定并学习这个账号。</div>
      </div>
      <button id="account-binding-action" type="button">绑定并学习这个账号</button>
    </section>

    <section id="update-panel" class="section update-panel hidden" aria-live="polite">
      <div class="section-row">
        <div class="section-title">插件更新</div>
        <div id="update-badge" class="update-badge">读取中</div>
      </div>
      <div id="update-summary" class="update-summary">正在读取更新状态...</div>
      <div id="update-meta" class="update-meta"></div>
      <div class="update-actions">
        <button id="check-update" type="button">检查更新</button>
        <button id="open-update-source" type="button">打开更新页</button>
      </div>
    </section>

    <section class="section page-recognition" aria-live="polite">
      <div id="platform-logo" class="platform-logo platform-redbox">
        <img id="platform-icon" class="platform-icon hidden" alt="">
        <span id="platform-fallback" class="platform-fallback">B</span>
      </div>
      <div id="platform-name" class="platform-name">正在识别页面</div>
      <div id="page-title" class="page-title">打开页面后自动识别平台</div>
      <div id="page-detail" class="page-detail">采集按钮会显示在下方操作模块中</div>
    </section>

    <section id="capture-action-panel" class="section capture-action-panel hidden" aria-live="polite">
      <div class="capture-head">
        <div id="capture-mark" class="capture-mark">B</div>
        <div class="capture-copy">
          <div id="capture-title" class="capture-title">Beav 页面采集</div>
          <div id="capture-subtitle" class="capture-subtitle">当前页面</div>
        </div>
      </div>
      <div id="capture-actions" class="capture-actions"></div>
      <div id="capture-options" class="capture-options hidden"></div>
      <div id="capture-status" class="capture-status" hidden></div>
    </section>

    <section id="blogger-notes-panel" class="section blogger-notes-panel hidden" aria-live="polite">
      <div class="section-row">
        <div class="section-title">博主笔记采集</div>
        <div id="blogger-notes-mode-pill" class="task-badge">API 模式</div>
      </div>
      <label class="switch-row">
        <input id="blogger-notes-api-mode" type="checkbox" checked>
        <span id="blogger-notes-mode-label">API 模式（更快）</span>
      </label>
      <div class="field-grid">
        <label class="field">
          <span>抓取数量</span>
          <input id="blogger-notes-limit" type="number" min="1" max="200" step="1">
        </label>
        <label class="field">
          <span>最大间隔（秒）</span>
          <input id="blogger-notes-interval-max" type="number" min="3" max="60" step="1">
        </label>
      </div>
      <div class="capture-actions">
        <button id="blogger-notes-start" type="button" class="primary">开始采集</button>
      </div>
      <div id="blogger-notes-progress" class="progress-card" hidden>
        <div class="progress-card-head">
          <div id="blogger-notes-progress-label" class="progress-card-label">准备开始</div>
          <div id="blogger-notes-progress-percent" class="progress-card-percent">0%</div>
        </div>
        <div class="progress-track">
          <div id="blogger-notes-progress-fill" class="progress-fill"></div>
        </div>
        <div id="blogger-notes-progress-meta" class="progress-card-meta">等待任务开始</div>
      </div>
      <div id="blogger-notes-controls" class="task-controls hidden">
        <button id="blogger-notes-pause" type="button">暂停</button>
        <button id="blogger-notes-resume" type="button" class="hidden">继续</button>
        <button id="blogger-notes-cancel" type="button">取消</button>
      </div>
    </section>

    <section class="section task-panel">
      <div class="section-row">
        <div class="section-title">任务队列</div>
        <div id="task-queue-badge" class="task-badge">空闲</div>
      </div>
      <div id="task-current" class="task-current">暂无执行任务</div>
      <div id="task-queue-meta" class="task-meta">队列为空</div>
      <div id="task-queue-controls" class="task-controls hidden">
        <button id="task-queue-pause" type="button">暂停</button>
        <button id="task-queue-resume" type="button" class="hidden">继续</button>
        <button id="task-queue-cancel" type="button">停止任务</button>
      </div>
    </section>

    <section class="section task-log-panel">
      <div class="section-row">
        <div class="section-title">执行日志</div>
        <div id="task-log-badge" class="log-badge">最近记录</div>
      </div>
      <div id="task-log-list" class="task-log-list">
        <div class="log-empty">暂无执行日志</div>
      </div>
    </section>

    <footer id="account-footer" class="account-footer hidden" aria-live="polite">
      <div class="account-footer-label">当前空间账号</div>
      <div id="bound-account-name" class="account-footer-value">等待连接 Beav</div>
    </footer>
  </main>
  <script src="sidepanel.js"></script>
</body>
</html>
