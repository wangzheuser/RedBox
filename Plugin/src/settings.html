<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beav 设置</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <main class="settings-shell">
    <header class="page-header">
      <div class="brand">
        <img src="icons/icon48.png" alt="Beav" class="brand-icon">
        <div>
          <h1>Beav 设置</h1>
          <p>采集任务、本地连接和更新检查参数</p>
        </div>
      </div>
      <button id="test-connection" class="btn">测试连接</button>
    </header>

    <form id="settings-form" class="settings-grid">
      <section class="panel">
        <h2>本地 Beav</h2>
        <label class="field">
          <span>Knowledge API 地址</span>
          <input id="api-base-url" type="url" spellcheck="false" placeholder="http://127.0.0.1:31937">
        </label>
        <label class="field">
          <span>接口路径</span>
          <input id="api-endpoint-path" type="text" spellcheck="false" placeholder="/api/knowledge">
        </label>
      </section>

      <section class="panel">
        <h2>默认行为</h2>
        <label class="switch-row">
          <input id="xhs-save-comments" type="checkbox">
          <span>保存小红书笔记时包含评论区</span>
        </label>
        <label class="switch-row">
          <input id="save-default" type="checkbox">
          <span>批量采集默认写入知识库</span>
        </label>
        <label class="switch-row">
          <input id="auto-update" type="checkbox">
          <span>自动检查插件更新</span>
        </label>
      </section>

      <section id="status" class="status-panel hidden"></section>

      <footer class="actions">
        <button id="reset-settings" type="button" class="btn ghost">恢复默认</button>
        <button type="submit" class="btn primary">保存设置</button>
      </footer>
    </form>
  </main>
  <script src="settings.js"></script>
</body>
</html>
